<ion-content class="bg-background" style="--background: transparent;">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="min-h-screen w-full overflow-x-hidden bg-background">
    <!-- Header -->
    <div class="sticky top-0 z-40 glass-effect border-b-0 pb-3 pt-4">
      <div class="mx-auto px-6 max-w-[1300px]">
        <h1 class="text-[22px] font-extrabold tracking-tight leading-tight text-slate-800 dark:text-slate-100">Schedule</h1>
        <p class="text-[12px] mt-0.5 font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Your upcoming medications</p>
      </div>
    </div>

    <!-- Main Content -->
    <div class="mx-auto px-6 py-6 pb-24 max-w-[1300px]">
      <!-- Loading State (Skeleton) -->
      <div *ngIf="isLoading" class="animate-pulse space-y-4">
        <div *ngFor="let i of [1, 2, 3]" class="premium-card p-5 flex items-start gap-4 border-l-[4px] border-l-slate-200">
          <div class="rounded-xl px-3 py-2 bg-slate-200/50 dark:bg-slate-800 h-14 w-[70px] flex-shrink-0"></div>
          <div class="flex-1 space-y-2 py-1">
            <div class="h-4 bg-slate-200/50 dark:bg-slate-800 rounded w-1/3"></div>
            <div class="h-3 bg-slate-200/50 dark:bg-slate-800 rounded w-1/4"></div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div *ngIf="!isLoading && upcomingReminders.length === 0" class="premium-card p-12 text-center border-none flex flex-col items-center justify-center min-h-[350px]">
        <div class="w-20 h-20 bg-emerald-100 dark:bg-emerald-950/30 rounded-3xl flex items-center justify-center mb-5 shadow-sm border border-emerald-200/20">
          <svg class="w-10 h-10 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" />
          </svg>
        </div>
        <h3 class="text-xl font-black mb-1.5 text-slate-800 dark:text-slate-100">All Caught Up!</h3>
        <p class="text-xs font-semibold text-slate-400 dark:text-slate-500">No more medications scheduled for today.</p>
      </div>

      <!-- Reminders Timeline List -->
      <div *ngIf="!isLoading && upcomingReminders.length > 0" class="timeline-wrapper space-y-5">
        <div *ngFor="let med of upcomingReminders" class="relative group pl-2 transition-all duration-300">
          
          <!-- Timeline active dot -->
          <div class="absolute left-[-22px] top-[26px] h-3.5 w-3.5 rounded-full border-2 border-white dark:border-slate-900 shadow-sm z-10 transition-colors"
               [ngClass]="med?.status === 'taken' ? 'bg-emerald-500' : 'bg-indigo-500'"></div>
          
          <!-- Card Body -->
          <div class="premium-card p-5 group relative overflow-hidden transition-all duration-300 border border-slate-200/50 dark:border-slate-800/80 bg-white dark:bg-slate-900"
               [ngClass]="med?.status === 'taken' ? 'border-l-[4px] border-l-emerald-500 opacity-70' : 'border-l-[4px] border-l-indigo-500 hover:translate-y-[-2px] hover:shadow-lg'">
            
            <div class="flex items-start justify-between gap-4">
              <div class="flex items-start gap-4 flex-1 min-w-0">
                <!-- Time Bubble -->
                <div class="flex flex-col items-center justify-center rounded-2xl px-3.5 py-2.5 border flex-shrink-0 min-w-[75px] shadow-sm bg-slate-50 dark:bg-slate-950 border-slate-100 dark:border-slate-800">
                  <span class="text-[9px] font-extrabold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-0.5" *ngIf="med?.reminderTime?.includes('AM') || med?.reminderTime?.includes('PM')">
                    {{ med.reminderTime.split(' ')[1] || '' }}
                  </span>
                  <span class="text-base font-black tracking-tight text-slate-800 dark:text-slate-100">
                    {{ med?.reminderTime?.split(' ')[0] || '--:--' }}
                  </span>
                </div>
                
                <!-- Medication Details -->
                <div class="flex-1 min-w-0 pt-0.5">
                  <div class="flex items-center gap-2">
                    <span class="text-base">💊</span>
                    <h3 class="font-extrabold text-[16px] leading-tight text-slate-800 dark:text-slate-100 truncate" [class.line-through]="med?.status === 'taken'">
                      {{ med?.name }}
                    </h3>
                  </div>
                  <p class="text-[12px] font-semibold text-slate-500 dark:text-slate-400 mt-1">
                    {{ med?.dosage }} • <span class="bg-indigo-50 dark:bg-indigo-950/50 text-indigo-600 dark:text-indigo-400 px-2 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-wider">{{ med?.category || 'General' }}</span>
                  </p>
                </div>
              </div>
              
              <!-- Status Badge -->
              <span *ngIf="med?.status !== 'taken'" class="px-3 py-1.5 text-[9px] font-extrabold uppercase tracking-widest rounded-full bg-amber-50 dark:bg-amber-950/20 text-amber-600 dark:text-amber-400 border border-amber-200/20 flex-shrink-0">
                Pending
              </span>
              <span *ngIf="med?.status === 'taken'" class="px-3 py-1.5 text-[9px] font-extrabold uppercase tracking-widest rounded-full bg-emerald-50 dark:bg-emerald-950/20 text-emerald-600 dark:text-emerald-400 border border-emerald-200/20 flex-shrink-0 flex items-center gap-1.5">
                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                </svg>
                Taken
              </span>
            </div>

            <!-- Action Buttons -->
            <div *ngIf="med?.status !== 'taken'" class="mt-4 pt-4 border-t border-slate-100 dark:border-slate-800/80">
              <button (click)="markAsTaken(med)" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white font-bold py-3 rounded-xl transition duration-200 shadow-md hover:shadow-lg active:scale-[0.99] flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                </svg>
                Mark as Taken
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<app-bottom-navigation></app-bottom-navigation>
