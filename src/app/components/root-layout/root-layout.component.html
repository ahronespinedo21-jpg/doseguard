<div class="flex h-screen transition-colors duration-300" style="background-color: var(--background);">
  <!-- Sidebar (only on authenticated pages) -->
  <app-sidebar *ngIf="showSidebar" [sidebarOpen]="sidebarOpen" (toggleSidebar)="toggleSidebar()"></app-sidebar>
  
  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden w-full max-w-full overflow-x-hidden">
    <!-- Mobile Header -->
    <div *ngIf="showSidebar" class="md:hidden border-b transition-colors duration-300 px-4 py-3 flex items-center justify-between"
         style="background-color: var(--card); border-color: rgba(0,0,0,0.05);">
      <div class="flex items-center gap-3">
        <img src="/assets/images/doseguard-logo.png" alt="DoseGuard Logo" 
             class="w-[34px] h-[34px] rounded-lg object-contain shadow-md flex-shrink-0" />
        <div>
          <h1 class="text-lg font-black tracking-tight leading-none" style="color: var(--text);">DoseGuard</h1>
          <p class="text-[8px] font-bold uppercase tracking-[0.1em] mt-0.5" style="color: var(--text-muted);">Health Manager</p>
        </div>
      </div>
      <button (click)="toggleSidebar()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>
    
    <!-- Scrollable Content Area -->
    <div class="flex-1 overflow-y-auto overflow-x-hidden w-full max-w-full">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- Scroll to Top Button -->
  <app-scroll-to-top></app-scroll-to-top>
</div>
