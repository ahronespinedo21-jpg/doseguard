<div class="modal-overlay" *ngIf="isOpen" (click)="onOverlayClick($event)" [class.show]="isOpen">
  <div class="modal-card" [class.show]="isOpen" [ngClass]="type">
    <div class="modal-header">
      <div class="icon-wrapper">
        <!-- Danger / Exclamation Icon -->
        <svg *ngIf="type === 'danger'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="modal-icon">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        
        <!-- Warning / Triangle Icon -->
        <svg *ngIf="type === 'warning'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="modal-icon">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>

        <!-- Info / Info Icon -->
        <svg *ngIf="type === 'info'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="modal-icon">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="16" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
      </div>
      <h3 class="modal-title">{{ title }}</h3>
    </div>
    
    <div class="modal-body">
      <p class="modal-message">{{ message }}</p>
    </div>
    
    <div class="modal-actions">
      <button type="button" class="btn btn-cancel" (click)="onCancel()">{{ cancelText }}</button>
      <button type="button" class="btn btn-confirm" (click)="onConfirm()">{{ confirmText }}</button>
    </div>
  </div>
</div>
